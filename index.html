<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudlink V2Ray - Download</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        html {
            height: 100%;
        }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-color: #03040b;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(112, 0, 255, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .font-tech { font-family: 'Rajdhani', sans-serif; }

        .glowing-card {
            background-color: rgba(18, 24, 40, 0.85);
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 15px 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.35);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.05);
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glowing-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: inherit;
            background: linear-gradient(45deg, transparent 40%, rgba(0, 243, 255, 0.2) 50%, transparent 60%);
            z-index: -1;
            animation: borderGlow 4s linear infinite;
            background-size: 200% 200%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes borderGlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .text-glow { text-shadow: 0 0 15px rgba(0, 243, 255, 0.5); }

        @keyframes dataFlow {
            0%   { left: -10px; opacity: 0; }
            15%  { opacity: 1; }
            85%  { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        @keyframes scan {
            0%   { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .btn-cyber {
            position: relative;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-cyber:hover {
            background: rgba(0, 243, 255, 0.2);
            border-color: rgba(0, 243, 255, 0.8);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-cyber::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-cyber:hover::after { left: 150%; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            background-color: rgba(0, 243, 255, 0.5);
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }

        /* On mobile: shift card above center using negative margin */
        @media (max-width: 640px) {
            .glowing-card {
                margin-bottom: 25vh;
            }
        }
    </style>
</head>
<body>

    <div class="glowing-card rounded-2xl p-5 max-w-sm w-full text-center z-10">

        <!-- Logo -->
        <div class="mb-2 flex justify-center relative">
            <div class="absolute inset-0 bg-blue-500 rounded-full blur-[35px] opacity-30"></div>
            <img src="app_main_logo_git.png" alt="Cloudlink V2Ray Logo"
                 class="w-20 h-20 rounded-2xl relative z-10 drop-shadow-[0_0_15px_rgba(0,150,255,0.4)] transition-transform hover:scale-105 duration-300"
                 onerror="this.src='https://via.placeholder.com/80/1e293b/38bdf8?text=CL'">
        </div>

        <h1 class="font-tech text-3xl font-bold mb-0 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500 text-glow uppercase tracking-wider">
            Cloudlink V2Ray
        </h1>
        <p class="text-cyan-500/60 text-xs font-semibold tracking-[0.2em] mb-3 uppercase">
            Secure Encrypted Tunnel
        </p>

        <!-- Animated Data Routing Nodes -->
        <div class="mb-4 relative flex items-center justify-between px-3 py-3 bg-black/60 rounded-xl border border-cyan-500/20 shadow-inner overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-cyan-500/10 to-transparent w-full h-[200%] animate-[scan_3s_linear_infinite]"></div>

            <div class="relative z-10 flex flex-col items-center gap-1 w-10">
                <i class="fa-solid fa-mobile-screen text-gray-400 text-sm"></i>
                <span class="text-[7px] text-gray-500 uppercase tracking-widest font-bold">Client</span>
            </div>

            <div class="relative z-10 flex-1 h-[2px] bg-gray-800 mx-1 flex items-center overflow-hidden rounded-full">
                <div class="absolute h-full w-4 bg-cyan-400 rounded-full shadow-[0_0_8px_#00f3ff] animate-[dataFlow_1.5s_linear_infinite]"></div>
            </div>

            <div class="relative z-10 flex flex-col items-center gap-1">
                <div class="w-8 h-8 rounded-full bg-cyan-500/20 border border-cyan-500/50 flex items-center justify-center shadow-[0_0_15px_rgba(0,243,255,0.3)]">
                    <i class="fa-solid fa-shield-halved text-cyan-400 text-xs"></i>
                </div>
                <span class="text-[7px] text-cyan-400 uppercase tracking-widest font-bold text-glow">V2Ray Core</span>
            </div>

            <div class="relative z-10 flex-1 h-[2px] bg-gray-800 mx-1 flex items-center overflow-hidden rounded-full">
                <div class="absolute h-full w-4 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6] animate-[dataFlow_1.5s_linear_infinite_0.75s]"></div>
            </div>

            <div class="relative z-10 flex flex-col items-center gap-1 w-10">
                <i class="fa-solid fa-globe text-gray-400 text-sm"></i>
                <span class="text-[7px] text-gray-500 uppercase tracking-widest font-bold">Web</span>
            </div>
        </div>

        <!-- Info Cards Row: File Size + Downloads + Release Date -->
        <div class="grid grid-cols-3 gap-2 mb-4">

            <!-- File Size -->
            <div class="bg-black/50 border border-white/10 rounded-xl p-2 flex flex-col items-center justify-center shadow-inner">
                <div class="w-7 h-7 rounded-lg bg-blue-500/20 flex items-center justify-center border border-blue-500/30 mb-1">
                    <i class="fa-solid fa-file-zipper text-blue-400 text-xs"></i>
                </div>
                <span class="text-[8px] text-gray-400 uppercase tracking-widest font-semibold">Size</span>
                <span id="apk-size" class="font-tech text-sm font-bold text-white text-glow">...</span>
            </div>

            <!-- Downloads -->
            <div class="bg-black/50 border border-white/10 rounded-xl p-2 flex flex-col items-center justify-center shadow-inner">
                <div class="w-7 h-7 rounded-lg bg-cyan-500/20 flex items-center justify-center border border-cyan-500/30 mb-1">
                    <i class="fa-solid fa-download text-cyan-400 text-xs"></i>
                </div>
                <span class="text-[8px] text-gray-400 uppercase tracking-widest font-semibold">Downloads</span>
                <span id="download-count" class="font-tech text-sm font-bold text-white text-glow">...</span>
            </div>

            <!-- Release Date -->
            <div class="bg-black/50 border border-white/10 rounded-xl p-2 flex flex-col items-center justify-center shadow-inner">
                <div class="w-7 h-7 rounded-lg bg-purple-500/20 flex items-center justify-center border border-purple-500/30 mb-1">
                    <i class="fa-solid fa-calendar text-purple-400 text-xs"></i>
                </div>
                <span class="text-[8px] text-gray-400 uppercase tracking-widest font-semibold">Released</span>
                <span id="release-date" class="font-tech text-sm font-bold text-white text-glow">...</span>
            </div>

        </div>

        <!-- Download Button -->
        <a href="#" id="downloadBtn"
           class="btn-cyber flex items-center justify-center gap-3 w-full text-cyan-300 font-tech font-bold text-lg py-3 px-6 rounded-xl uppercase tracking-widest">
            <i class="fa-brands fa-android text-xl relative z-10 pointer-events-none"></i>
            <span class="relative z-10 pointer-events-none">Download APK</span>
        </a>

        <!-- Download Status -->
        <div class="my-2 flex items-center justify-center gap-2">
            <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-600 transition-all duration-500"></span>
            <p id="download-status" class="text-[10px] text-gray-500 tracking-widest uppercase font-semibold transition-all duration-500">
                Tap the button above to download
            </p>
        </div>

        <!-- Footer -->
        <div class="mt-3 pt-3 border-t border-cyan-500/20">
            <p class="text-[10px] text-gray-500 tracking-widest uppercase flex items-center justify-center gap-2">
                <i class="fa-solid fa-microchip text-cyan-500/50"></i>
                Build by FixBuild Core X
            </p>
        </div>

    </div>

    <p class="fixed bottom-3 left-0 right-0 text-center text-[9px] text-gray-700 tracking-widest uppercase">Page v1.0</p>

    <script>
        const GITHUB_API = 'https://api.github.com/repos/FixBuildCreation/CloudLinkV2Ray/releases/latest';

        async function fetchReleaseInfo() {
            try {
                const response = await fetch(GITHUB_API);
                const data = await response.json();

                const apkAsset = data.assets && data.assets.find(a => a.name.endsWith('.apk'));

                if (apkAsset) {
                    // File Size
                    const mb = (apkAsset.size / (1024 * 1024)).toFixed(2);
                    document.getElementById('apk-size').innerText = mb + ' MB';

                    // Downloads
                    document.getElementById('download-count').innerText =
                        apkAsset.download_count.toLocaleString();

                    // Download URL — store in variable, not href
                    window._apkDownloadUrl = apkAsset.browser_download_url;
                }

                // Release Date
                const date = new Date(data.published_at);
                const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                document.getElementById('release-date').innerText = formatted;

            } catch (error) {
                console.error('Error fetching release info:', error);
                document.getElementById('apk-size').innerText = '87.56 MB';
                document.getElementById('download-count').innerText = '—';
                document.getElementById('release-date').innerText = 'Apr 29, 2026';
            }
        }

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('download-status');

        function setStatus(state) {
            if (state === 'downloading') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_6px_#00f3ff] transition-all duration-500';
                statusText.className = 'text-[10px] text-cyan-400 tracking-widest uppercase font-semibold transition-all duration-500 text-glow';
                statusText.innerText = 'Download in progress...';
            } else {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-gray-600 transition-all duration-500';
                statusText.className = 'text-[10px] text-gray-500 tracking-widest uppercase font-semibold transition-all duration-500';
                statusText.innerText = 'Tap the button above to download';
            }
        }

        function triggerDownload(url) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            document.body.appendChild(iframe);
            setTimeout(() => document.body.removeChild(iframe), 10000);
        }

        // Auto-download APK 2 seconds after page loads
        async function autoDownload() {
            try {
                const response = await fetch(GITHUB_API);
                const data = await response.json();
                const apkAsset = data.assets && data.assets.find(a => a.name.endsWith('.apk'));
                if (apkAsset) {
                    setStatus('downloading');
                    const a = document.createElement('a');
                    a.href = apkAsset.browser_download_url;
                    a.download = apkAsset.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => setStatus('idle'), 8000);
                }
            } catch (e) {
                console.error('Auto-download failed:', e);
                setStatus('idle');
            }
        }

        fetchReleaseInfo();
        setInterval(fetchReleaseInfo, 30000);

        // Auto-download on every page load
        setTimeout(autoDownload, 2000);

        // Ripple effect + status on manual click
        const btn = document.getElementById('downloadBtn');
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            setStatus('downloading');
            setTimeout(() => setStatus('idle'), 8000);
            if (window._apkDownloadUrl) triggerDownload(window._apkDownloadUrl);
            const rect = this.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height);
            ripple.classList.add('ripple');
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top  = (e.clientY - rect.top  - size / 2) + 'px';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    </script>

</body>
</html>

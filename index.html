<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudLink V2Ray - Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
            font-weight: 500;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .download-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .release-link {
            display: block;
            text-align: center;
            color: #667eea;
            text-decoration: none;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .release-link:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 CloudLink V2Ray</h1>
        <div class="subtitle">Latest Release</div>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Loading release information...
            </div>
        </div>
    </div>

    <script>
        // GitHub API Configuration
        const GITHUB_API = 'https://api.github.com/repos/FixBuildCreation/CloudLinkV2Ray/releases/latest';
        
        async function fetchReleaseInfo() {
            try {
                const response = await fetch(GITHUB_API);
                const data = await response.json();
                
                if (data.assets && data.assets.length > 0) {
                    const apkAsset = data.assets.find(asset => asset.name.endsWith('.apk')) || data.assets[0];
                    displayReleaseInfo(data, apkAsset);
                } else {
                    showError('No APK file found in the release');
                }
            } catch (error) {
                showError('Failed to load release information');
                console.error('Error:', error);
            }
        }
        
        function displayReleaseInfo(release, asset) {
            const size = (asset.size / (1024 * 1024)).toFixed(2);
            const downloads = asset.download_count;
            const version = release.tag_name;
            const publishedDate = new Date(release.published_at).toLocaleDateString();
            
            const contentHTML = `
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label">Version</span>
                        <span class="info-value">${version}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">File Size</span>
                        <span class="info-value">${size} MB</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Downloads</span>
                        <span class="info-value">${downloads.toLocaleString()}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Released</span>
                        <span class="info-value">${publishedDate}</span>
                    </div>
                </div>
                
                <a href="${asset.browser_download_url}" class="download-btn" download>
                    📥 Download APK
                </a>
                
                <a href="${release.html_url}" class="release-link" target="_blank">
                    View on GitHub →
                </a>
            `;
            
            document.getElementById('content').innerHTML = contentHTML;
        }
        
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="info-box">
                    <div style="text-align: center; color: #e53e3e; padding: 20px;">
                        ⚠️ ${message}
                    </div>
                </div>
            `;
        }
        
        // Load release info on page load
        fetchReleaseInfo();
        
        // Auto-refresh every 30 seconds to update download count
        setInterval(fetchReleaseInfo, 30000);
    </script>
</body>
</html>

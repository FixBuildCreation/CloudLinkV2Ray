    <script>
        // --- 1. Button Ripple Effect ---
        const btn = document.getElementById('downloadBtn');
        
        btn.addEventListener('click', function(e) {
            let rect = this.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            
            let size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (x - size / 2) + 'px';
            ripple.style.top = (y - size / 2) + 'px';
            
            this.appendChild(ripple);
            
            setTimeout(() => { ripple.remove(); }, 600);
        });

        // --- 3. UPDATED: Fetch File Size Logic pointing to your GitHub link ---
        const apkUrl = 'https://github.com/FixBuildCreation/CloudLinkV2Ray/raw/main/app.fixbuild.vpncore.cloudlinkNv2ray-release.apk'; 
        const sizeElement = document.getElementById('apk-size');

        async function fetchApkSize() {
            try {
                const response = await fetch(apkUrl, { method: 'HEAD' });
                const bytes = response.headers.get('content-length');
                
                if (bytes) {
                    const mb = (bytes / (1024 * 1024)).toFixed(1);
                    sizeElement.innerText = `${mb} MB`;
                } else {
                    sizeElement.innerText = 'Ready';
                }
            } catch (error) {
                console.error('Error fetching file size:', error);
                sizeElement.innerText = 'Ready';
            }
        }

        fetchApkSize();
    </script>
